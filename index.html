        :root {

          --bm-warn: #BA7517;
          --bm-bg: #f8fafc;
          --bm-card-bg: #fff;
          --bm-border: #e9ecef;
        }
        .bm-app { font-size: var(--bm-font) !important; }
        .bm-app * { font-size: inherit; box-sizing: border-box; }
        .bm-app h2 { font-size: calc(var(--bm-font) * 1.5) !important; }
        .bm-app h3 { font-size: calc(var(--bm-font) * 1.15) !important; }

        .bm-card-sub { font-size: calc(var(--bm-font) * 0.78) !important; color: #777; margin-top: 4px; line-height: 1.4; }
        .bm-card-primary { border-color: var(--bm-primary); background: #f0f4ff; }
        .bm-card-primary .bm-card-label { color: var(--bm-primary); }
        .bm-card-done { background: #E1F5EE; border-color: var(--bm-success); }
        .bm-card-warn { background: #FFF8EE; border-color: var(--bm-warn); }
        .bm-card-badge {
          position: absolute; top: -8px; right: -8px;
          min-width: 24px; height: 24px; border-radius: 12px;
          padding: 0 6px;
          display: flex; align-items: center; justify-content: center;
          font-size: 11px !important; font-weight: 700; color: #fff;
          box-shadow: 0 2px 6px rgba(0,0,0,0.18);
        }
        .bm-badge-alert { background: var(--bm-danger); }
        .bm-badge-done { background: var(--bm-success); }
        .bm-badge-warn { background: var(--bm-warn); }

        /* ==== رأس الشاشة الفرعية ==== */
        .bm-screen-hdr {
          display: flex; align-items: center; gap: 10px;

          position: sticky; top: 0; z-index: 50;
        }
        .bm-back-btn {
          background: var(--bm-primary); border: 2px solid var(--bm-primary);

        .bm-back-btn:active { transform: translateX(0); }
        .bm-screen-title { flex: 1; font-size: calc(var(--bm-font) * 1.2) !important; font-weight: 700; color: #1a2a4a; }
        .bm-screen-month {
          background: #f0f4ff; color: var(--bm-primary);
          padding: 4px 10px; border-radius: 8px; font-size: 12px !important; font-weight: 600;
        }

        /* ==== شريط اختيار الشهر ==== */
        .bm-month-nav {
          display: flex; gap: 4px; align-items: center; flex-wrap: wrap;
        }
        .bm-month-nav button:hover { background: #f0f4ff !important; }
        @media (max-width: 600px) {
          .bm-month-nav { width: 100%; gap: 4px; }
          .bm-month-nav select { flex: 1; font-size: 13px !important; padding: 8px 10px !important; }
          .bm-month-nav button { min-height: 38px !important; min-width: 38px !important; }
        }

        .bm-coll-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));

          gap: 2px;
        }
        .bm-apt-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.1); }

        .bm-apt-exempt { background: #f0f0f0; border-color: #ccc; color: #888; }
